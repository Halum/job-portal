# Application-level config (non-secret). Secrets and connection strings live
# in env vars (.env / GitHub secrets / host env) — see .env.example.
llm:
  filter:
    model: "openai/gpt-4o-mini"
    max_tokens: 300
    temperature: 0
  summary:
    model: "openai/gpt-4o"
    max_tokens: 800
    temperature: 0.3
  global_concurrency: 4
  rate_limit:
    max_per_window: 20
    window_ms: 60000

retries:
  scrape:
    attempts: 3
    backoff_ms: 5000
  enrichment:
    attempts: 3
    backoff_ms: 10000
  webhook_error:
    attempts: 5
    backoff_ms: 2000

n8n:
  error_webhook_url: "https://n8n.example.com/webhook/job-portal-errors"

timezone: "Europe/Berlin"
