# Source declarations. Each entry drives one BullMQ repeatable scrape job.
# cron is a standard 5-field expression, interpreted in the timezone set in
# app.yaml (Europe/Berlin).
sources:
  - name: arbeitsagentur-bamberg
    source_type: arbeitsagentur
    url: "https://www.arbeitsagentur.de/jobsuche/suche?angebotsart=1&wo=96052%20Bamberg&umkreis=15&arbeitszeit=tz;mj&sort=veroeffdatum"
    cron: "0 */6 * * *"
    enabled: true

  - name: feki-jobboerse
    source_type: feki
    url: "https://www.feki.de/jobboerse"
    cron: "0 7,19 * * *"
    enabled: true
