name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_DIR: /root/job-portal-deployed

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Sync code to app directory
        run: |
          mkdir -p ${{ env.APP_DIR }}
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'coverage' \
            --exclude 'tmp' \
            --exclude '.env' \
            ./ ${{ env.APP_DIR }}/

      # Single source of truth for every secret. Compose reads it via `env_file`.
      - name: Write .env from ENV_FILE secret
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          printf '%s\n' "$ENV_FILE" > ${{ env.APP_DIR }}/.env
          chmod 600 ${{ env.APP_DIR }}/.env

      # No migrate step: the api/worker run runMigrationsWithLock at boot under a
      # Postgres advisory lock, and the prod image ships the drizzle SQL, so
      # migrations self-apply on startup without tsx on the runner.
      - name: Deploy with Docker Compose
        working-directory: ${{ env.APP_DIR }}
        run: |
          docker compose -f docker/docker-compose.yml build
          docker compose -f docker/docker-compose.yml up -d --force-recreate --remove-orphans

      - name: Wait for health check
        working-directory: ${{ env.APP_DIR }}
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker compose -f docker/docker-compose.yml logs --tail=50
          exit 1
